# social-brain configuration
# Copy this file to config.yaml and fill in your real values.
#   cp config.example.yaml config.yaml
# config.yaml is gitignored — it will never be committed.

# --- Mastodon ---
mastodon_instance: hachyderm.io        # e.g. mastodon.social, fosstodon.org
mastodon_handle: yourhandle            # without the @ or instance, just the username

# --- Bluesky ---
bluesky_handle: yourhandle.bsky.social # full handle including .bsky.social or custom domain

# --- Buttondown ---
buttondown_api_key: YOUR_BUTTONDOWN_API_KEY

# --- Jetpack / WordPress.com Stats ---
jetpack_site: yourdomain.com           # your WordPress site domain
jetpack_access_token: YOUR_JETPACK_ACCESS_TOKEN

# --- Amazon (public product pages, no auth required) ---
amazon_asins:
  - B0XXXXXXXXXX   # Kindle edition
  - 1234567890     # Paperback ISBN-10
amazon_marketplaces:           # collect from all listed marketplaces
  - amazon.com
  - amazon.co.uk
  # - amazon.de
  # - amazon.ca

# --- Mentions / inbound links ---
monitored_domains:
  - yourdomain.com         # blog or main site
  - yourcoursedomain.com   # course site, etc.

# Mastodon @ mention notifications (optional — requires an OAuth access token)
# To get one: Mastodon → Settings → Development → New Application → read:notifications scope
# mastodon_access_token: YOUR_MASTODON_ACCESS_TOKEN

# Bluesky @ mention notifications (optional — use an App Password, not your main password)
# To get one: Bluesky → Settings → Privacy and Security → App Passwords
# bluesky_app_password: YOUR_BLUESKY_APP_PASSWORD

# Google Search Console (optional — requires a service account JSON file)
# See README for setup instructions.
# gsc_credentials_file: /path/to/service-account.json

# --- Buffer (optional) ---
# Personal access token from buffer.com/manage/apps-and-extras/apps
buffer_token: YOUR_BUFFER_TOKEN

# --- Vercel Web Analytics (optional) ---
# Leave blank to skip Vercel collection.
vercel_token: YOUR_VERCEL_TOKEN        # Vercel account token (Settings → Tokens)
vercel_project_id: your-project-slug  # Project name/slug (shown in the URL, e.g. "my-app")
vercel_team_id:                        # Team ID if the project is in a team (optional)

# --- Content strategy ---
# primary_focus: the metric or outcome you care about most. Claude uses this to frame
# the analysis and recommend data sources that would help measure it better.
# Examples: "conversion rate", "newsletter growth", "reach", "book sales"
primary_focus: conversion rate — turning readers into newsletter subscribers and buyers

content_pillars:
  - Open source and developer tools
  - Personal knowledge management
  - Tech ethics and digital wellbeing
  - Career and working in public

weekly_goals:
  - Grow newsletter subscriber count
  - Drive traffic to latest blog post
  - Increase engagement on Mastodon
  - Experiment with short-form video on Bluesky
